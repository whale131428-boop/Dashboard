<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ Neko Coffee IoT Dashboard 🐾</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f4e3c5;       /* สีครีม/ฟองนม */
            --card-bg: #dcb88e;        /* สีลาเต้ */
            --border-color: #4a2c11;   /* สีน้ำตาลเข้ม/เมล็ดกาแฟ */
            --text-main: #361f0a;      /* สีข้อความ */
            --accent-color: #8c5a35;   /* สีตกแต่ง */
            --on-color: #4caf50;       /* สีสถานะ ON/ACTIVE */
            --off-color: #f44336;      /* สีสถานะ OFF */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'VT323', monospace;
            margin: 0;
            padding: 20px;
            background-image: 
                radial-gradient(var(--card-bg) 2px, transparent 2px),
                radial-gradient(var(--card-bg) 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            text-align: center;
            font-size: 24px;
            line-height: 1.5;
            color: var(--border-color);
            text-shadow: 2px 2px 0px var(--card-bg);
            margin-bottom: 40px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* สไตล์กรอบแบบเกม 8-bit */
        .pixel-box {
            background-color: var(--card-bg);
            border: 4px solid var(--border-color);
            box-shadow: 
                inset -4px -4px 0px 0px rgba(0,0,0,0.15),
                4px 4px 0px 0px var(--border-color);
            padding: 20px;
            margin: 15px;
            border-radius: 2px;
            position: relative;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .device-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: transform 0.1s;
        }

        .device-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 
                inset -4px -4px 0px 0px rgba(0,0,0,0.15),
                6px 6px 0px 0px var(--border-color);
        }

        .icon {
            font-size: 48px;
            margin-bottom: 10px;
            filter: drop-shadow(2px 2px 0px var(--border-color));
        }

        .device-name {
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            margin: 10px 0;
            color: var(--text-main);
        }

        .device-details {
            font-size: 22px;
            margin: 5px 0;
            width: 100%;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            border: 2px solid var(--border-color);
            background-color: #fff;
            color: var(--border-color);
            margin-top: 10px;
        }

        .status-ON, .status-ACTIVE {
            background-color: var(--on-color);
            color: white;
            border-color: #1b5e20;
        }

        .status-OFF {
            background-color: var(--off-color);
            color: white;
            border-color: #b71c1c;
        }

        /* ตกแต่งด้วยแมวสุดคิวท์ */
        .cat-decoration {
            font-size: 32px;
            position: absolute;
            bottom: -15px;
            right: -15px;
            filter: drop-shadow(2px 2px 0px var(--border-color));
            z-index: 10;
        }

        #loading {
            text-align: center;
            font-size: 24px;
            font-family: 'Press Start 2P', cursive;
            color: var(--border-color);
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>☕ Neko Cafe <br><span style="font-size: 16px;">IoT Dashboard 🐾</span></h1>
        
        <div id="loading">LOADING DATA... 🐈</div>
        
        <div class="dashboard-grid" id="dashboard">
            </div>
    </div>

    <script>
        // ข้อมูลจำลอง (Mock Data) เผื่อกรณี API เรียกไม่ได้ (ติด CORS หรือ Server ดาวน์)
        const mockData = {
            "success": true,
            "count": 5,
            "data": [
                { "id": "1", "device_name": "LED1", "device_type": "LED", "pin": "13", "status": "ON", "created_at": "2026-06-30 10:16:41" },
                { "id": "2", "device_name": "LED2", "device_type": "LED", "pin": "12", "status": "OFF", "created_at": "2026-06-30 10:16:41" },
                { "id": "3", "device_name": "Temperature", "device_type": "SENSOR", "pin": "34", "status": "ACTIVE", "created_at": "2026-06-30 10:16:41" },
                { "id": "4", "device_name": "Humidity", "device_type": "SENSOR", "pin": "35", "status": "ACTIVE", "created_at": "2026-06-30 10:16:41" },
                { "id": "5", "device_name": "Soil Moisture", "device_type": "SENSOR", "pin": "36", "status": "ACTIVE", "created_at": "2026-06-30 10:16:41" }
            ]
        };

        // ฟังก์ชันเลือก Icon ให้เข้ากับอุปกรณ์และธีม
        function getDeviceIcon(name, type) {
            const nameLower = name.toLowerCase();
            if (nameLower.includes('temp')) return '🌡️';
            if (nameLower.includes('humid')) return '💧';
            if (nameLower.includes('soil')) return '🌱';
            if (type === 'LED') return '💡';
            return '⚙️';
        }

        // ฟังก์ชันเลือกแมวตกแต่งกรอบ (สุ่มหรือกำหนดเอง)
        function getRandomCat() {
            const cats = ['🐈', '🐱', '🐾', '🧶', '☕'];
            return cats[Math.floor(Math.random() * cats.length)];
        }

        // ฟังก์ชันสร้าง Card HTML
        function renderDashboard(devices) {
            const dashboard = document.getElementById('dashboard');
            const loading = document.getElementById('loading');
            
            dashboard.innerHTML = ''; // ล้างค่าเก่า
            loading.style.display = 'none'; // ซ่อนข้อความ Loading

            devices.forEach(device => {
                const card = document.createElement('div');
                card.className = 'pixel-box device-card';
                
                const icon = getDeviceIcon(device.device_name, device.device_type);
                const cat = getRandomCat();

                card.innerHTML = `
                    <div class="icon">${icon}</div>
                    <div class="device-name">${device.device_name}</div>
                    <div class="device-details">Type: ${device.device_type}</div>
                    <div class="device-details">Pin: ${device.pin}</div>
                    <div class="status-badge status-${device.status}">${device.status}</div>
                    <div class="cat-decoration">${cat}</div>
                `;
                
                dashboard.appendChild(card);
            });
        }

        // ฟังก์ชันดึงข้อมูลจาก API
        async function fetchAPI() {
            try {
                const response = await fetch('http://tc.sbtc-mng.com/api.php');
                if (!response.ok) throw new Error('Network response was not ok');
                const result = await response.json();
                
                if (result.success) {
                    renderDashboard(result.data);
                } else {
                    throw new Error('API reported unsuccessful');
                }
            } catch (error) {
                console.warn('⚠️ ไม่สามารถเชื่อมต่อ API ได้ (อาจติดปัญหา CORS) ระบบกำลังแสดงผลข้อมูลจำลองแทน', error);
                renderDashboard(mockData.data);
            }
        }

        // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
        window.onload = fetchAPI;
        
        // หากต้องการให้รีเฟรชข้อมูลทุกๆ 5 วินาที ให้เอา Comment บรรทัดล่างออกครับ
        // setInterval(fetchAPI, 5000); 
    </script>
</body>
</html>
